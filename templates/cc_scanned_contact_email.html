<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="x-apple-disable-message-reformatting" />
  <title>{{SUBJECT}}</title>
  <!--[if !mso]><!-->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Inter+Tight:wght@500;600;700&display=swap" rel="stylesheet" />
  <!--<![endif]-->
</head>
<body style="margin:0;padding:0;background-color:#eef6f9;font-family:'Inter',ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,Helvetica,sans-serif;-webkit-text-size-adjust:100%;-ms-text-size-adjust:100%;">
  <div style="display:none;max-height:0;overflow:hidden;">
    Scanned contact details from {{COMPANY}}.
  </div>
  <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="background-color:#eef6f9;border-collapse:collapse;">
    <tr>
      <td align="center" style="padding:32px 16px;">
        <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="600" style="max-width:600px;width:100%;border-collapse:collapse;">
          <tr>
            <td style="background:linear-gradient(135deg,#0891b2,#0e7490);background-color:#0891b2;border-radius:16px 16px 0 0;padding:24px 36px;">
              <p style="margin:0 0 6px;font-family:'Inter',Arial,Helvetica,sans-serif;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.85);font-weight:600;">
                {{COMPANY}}
              </p>
              <h1 style="margin:0;font-family:'Inter Tight','Inter',Arial,Helvetica,sans-serif;font-size:22px;line-height:1.25;font-weight:700;letter-spacing:-0.02em;color:#ffffff;">
                Scanned Contact Details
              </h1>
            </td>
          </tr>
          <tr>
            <td style="background-color:#ffffff;border-left:1px solid #e2e8f0;border-right:1px solid #e2e8f0;padding:28px 36px;font-family:'Inter',Arial,Helvetica,sans-serif;">
              <p style="margin:0 0 20px;font-family:'Inter',Arial,Helvetica,sans-serif;font-size:14px;line-height:1.6;color:#64748b;">
                A business card was scanned and saved. Details captured from the card are below.
              </p>
              <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="border-collapse:collapse;background-color:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;overflow:hidden;">
                {{DETAIL_ROWS}}
              </table>
            </td>
          </tr>
          <tr>
            <td align="center" style="background-color:#f8fafc;border:1px solid #e2e8f0;border-top:none;border-radius:0 0 16px 16px;padding:20px 36px;font-family:'Inter',Arial,Helvetica,sans-serif;font-size:12px;line-height:1.5;color:#64748b;">
              &copy; {{YEAR}} {{COMPANY}}. Internal notification — CC copy of scanned contact data.
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
